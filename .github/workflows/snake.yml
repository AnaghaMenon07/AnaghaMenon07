on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: AnaghaMenon07
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=0066ff&color_dots=#0d1117,#003399,#0044cc,#0055ff,#0066ff
            dist/github-contribution-grid-snake-dark.svg?color_snake=00aaff&color_dots=#0d1117,#003399,#0044cc,#0055ff,#00aaff

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
